<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🐷 Piggy Paradise Farm</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(#87CEEB, #98FB98);
      font-family: Arial, sans-serif;
      text-align: center;
    }h1 {
  position: absolute;
  width: 100%;
  top: 10px;
  color: #fff;
  text-shadow: 2px 2px 4px #000;
  z-index: 10;
}

.farm {
  position: relative;
  width: 100vw;
  height: 100vh;
}

.pig {
  position: absolute;
  font-size: 40px;
  pointer-events: none;
  transition: transform 0.2s;
}

.tree { position: absolute; font-size: 60px; }
.flower { position: absolute; font-size: 30px; }

  </style>
</head>
<body>
  <img src:"Piggy.jpg">
  <h1>🐷 Piggy Paradise 🌸</h1>
  <div class="farm" id="farm">
    <!-- Decorations -->
    <div class="tree" style="top:20%; left:10%;">🌳</div>
    <div class="tree" style="top:60%; left:80%;">🌳</div>
    <div class="flower" style="top:70%; left:20%;">🌼</div>
    <div class="flower" style="top:40%; left:60%;">🌸</div>
    <div class="flower" style="top:80%; left:50%;">🌻</div>
  </div>  <script>
    const farm = document.getElementById("farm");
    const pigs = [];
    const PIG_COUNT = 20; // lots of pigs 🐷🐷🐷

    // create pigs
    for (let i = 0; i < PIG_COUNT; i++) {
      const pig = document.createElement("div");
      pig.className = "pig";
      pig.textContent = "🐷";

      // random starting position
      pig.style.left = Math.random() * window.innerWidth + "px";
      pig.style.top = Math.random() * window.innerHeight + "px";

      farm.appendChild(pig);
      pigs.push(pig);
    }

    function movePig(pig) {
      const maxX = window.innerWidth - 40;
      const maxY = window.innerHeight - 40;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      pig.style.left = x + "px";
      pig.style.top = y + "px";

      // flip direction
      pig.style.transform = Math.random() > 0.5 ? "scaleX(1)" : "scaleX(-1)";
    }

    function animatePigs() {
      pigs.forEach(pig => movePig(pig));
    }

    setInterval(animatePigs, 600);
  </script></body>
</html>
